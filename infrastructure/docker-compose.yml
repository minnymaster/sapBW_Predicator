services:

  # ---------------------------------------------------------------------------
  # company_db — сотрудники, KPI, назначения (Manage API, Reports API)
  # ---------------------------------------------------------------------------
  company_db:
    image: postgres:16-alpine
    container_name: sapbw_company_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       company_db
      POSTGRES_USER:     company_user
      POSTGRES_PASSWORD: company_pass
    ports:
      - "5432:5432"
    volumes:
      - company_db_data:/var/lib/postgresql/data
      - ./postgres/company_db/init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U company_user -d company_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sapbw_net

  # ---------------------------------------------------------------------------
  # courses_db — библиотека курсов и материалов (Courses API)
  # ---------------------------------------------------------------------------
  courses_db:
    image: postgres:16-alpine
    container_name: sapbw_courses_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       courses_db
      POSTGRES_USER:     courses_user
      POSTGRES_PASSWORD: courses_pass
    ports:
      - "5433:5432"
    volumes:
      - courses_db_data:/var/lib/postgresql/data
      - ./postgres/courses_db/init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courses_user -d courses_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sapbw_net

  # ---------------------------------------------------------------------------
  # certification_db — вопросы, попытки, результаты (Tests API)
  # ---------------------------------------------------------------------------
  certification_db:
    image: postgres:16-alpine
    container_name: sapbw_certification_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       certification_db
      POSTGRES_USER:     certification_user
      POSTGRES_PASSWORD: certification_pass
    ports:
      - "5434:5432"
    volumes:
      - certification_db_data:/var/lib/postgresql/data
      - ./postgres/certification_db/init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U certification_user -d certification_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sapbw_net

  # ---------------------------------------------------------------------------
  # tests-api — NestJS, UC-01–UC-03, UC-05
  # ---------------------------------------------------------------------------
  tests-api:
    build:
      context: ../backend/services/tests-api
      dockerfile: Dockerfile
    container_name: sapbw_tests_api
    restart: unless-stopped
    environment:
      CERTIFICATION_DATABASE_URL: "postgresql://certification_user:certification_pass@certification_db:5432/certification_db?schema=public"
      PORT: 3001
      NODE_ENV: production
      JWT_PUBLIC_KEY: "${JWT_PUBLIC_KEY}"
      LLM_PROVIDER: "${LLM_PROVIDER:-groq}"
      LLM_BASE_URL: "${LLM_BASE_URL:-https://api.groq.com/openai/v1}"
      LLM_API_KEY: "${LLM_API_KEY}"
      LLM_MODEL: "${LLM_MODEL:-llama-3.1-70b-versatile}"
    ports:
      - "3001:3001"
    depends_on:
      certification_db:
        condition: service_healthy
    networks:
      - sapbw_net

volumes:
  company_db_data:
  courses_db_data:
  certification_db_data:

networks:
  sapbw_net:
    driver: bridge
